<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Games</title>
</head>
<body>

<h1>Game List</h1>

<div th:each="game : ${games}">
    <h2 th:text="${game.title}"></h2>
    <p th:text="${game.genre}"></p>
    <p>Rating: <span th:text="${game.rating}"></span></p>
    <hr>
</div>

</body>
</html>
